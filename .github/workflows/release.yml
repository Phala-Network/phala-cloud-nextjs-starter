name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      ref:
        description: 'git ref/branch/sha to release from (optional)'
        required: false
        default: 'main'
        type: string
  issue_comment:
    types: [created]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
    outputs:
      should_release: ${{ steps.parse.outputs.should_release }}
      bump: ${{ steps.parse.outputs.bump }}
      target_sha: ${{ steps.parse.outputs.target_sha }}
      source: ${{ steps.parse.outputs.source }}
      repo_lower: ${{ steps.parse.outputs.repo_lower }}
    steps:
      - name: parse trigger
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName
            let shouldRelease = false
            let bump = ''
            let targetSha = ''
            let source = eventName

            if (eventName === 'workflow_dispatch') {
              shouldRelease = true
              bump = (context.payload.inputs?.bump || '').toLowerCase()
              targetSha = context.payload.inputs?.ref || context.ref.replace('refs/heads/', '')
            }

            if (eventName === 'issue_comment') {
              const body = (context.payload.comment?.body || '').trim()
              const match = body.match(/^!release\s+(patch|minor|major)$/i)
              const assoc = context.payload.comment?.author_association || 'NONE'
              const allowed = ['OWNER', 'MEMBER', 'COLLABORATOR']

              if (match && context.payload.issue?.pull_request && allowed.includes(assoc)) {
                const prNumber = context.payload.issue.number
                const pr = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                })
                shouldRelease = true
                bump = match[1].toLowerCase()
                targetSha = pr.data.head.sha
                source = `pr#${prNumber}`
              }
            }

            core.setOutput('should_release', shouldRelease ? 'true' : 'false')
            core.setOutput('bump', bump)
            core.setOutput('target_sha', targetSha)
            core.setOutput('source', source)
            core.setOutput('repo_lower', `${context.repo.owner.toLowerCase()}/${context.repo.repo.toLowerCase()}`)

  create-tag:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
          fetch-depth: 0

      - name: fetch tags
        run: git fetch --tags --force

      - name: compute next version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          latest=$(git tag -l 'v*' --sort=-v:refname | head -n1 || true)
          if [ -z "$latest" ]; then
            latest="v0.0.0"
          fi

          raw="${latest#v}"
          IFS='.' read -r major minor patch <<< "$raw"
          bump="${{ needs.prepare.outputs.bump }}"

          case "$bump" in
            patch)
              patch=$((patch + 1))
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            *)
              echo "invalid bump: $bump" >&2
              exit 1
              ;;
          esac

          next="v${major}.${minor}.${patch}"
          if git rev-parse "$next" >/dev/null 2>&1; then
            echo "tag already exists: $next" >&2
            exit 1
          fi

          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$latest" >> "$GITHUB_OUTPUT"

      - name: generate changelog
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          prev="${{ steps.version.outputs.previous_tag }}"
          if [ "$prev" = "v0.0.0" ] && [ -z "$(git tag -l 'v*')" ]; then
            log=$(git log --pretty=format:'- %s (%h)')
          else
            log=$(git log --pretty=format:'- %s (%h)' "${prev}"..HEAD)
          fi
          if [ -z "$log" ]; then
            log='- no user-facing changes'
          fi
          {
            echo 'changelog<<EOF'
            echo "$log"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: create and push tag
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$version" -m "release $version"
          git push origin "$version"

  build-and-push:
    needs: create-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout release tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.create-tag.outputs.version }}

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: set image tags
        id: img
        shell: bash
        run: |
          set -euo pipefail
          repo_name=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          repo="${{ env.REGISTRY }}/${repo_name}"
          version="${{ needs.create-tag.outputs.version }}"
          echo "tags=${repo}:${version},${repo}:latest" >> "$GITHUB_OUTPUT"

      - name: build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.img.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    needs: [prepare, create-tag, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-tag.outputs.version }}
          name: Release ${{ needs.create-tag.outputs.version }}
          body: |
            ## changelog

            ${{ needs.create-tag.outputs.changelog }}

            ## docker image

            ```bash
            docker pull ghcr.io/${{ needs.prepare.outputs.repo_lower }}:${{ needs.create-tag.outputs.version }}
            ```

            latest alias:

            ```bash
            docker pull ghcr.io/${{ needs.prepare.outputs.repo_lower }}:latest
            ```
          make_latest: false

  post-release:
    needs: [prepare, create-tag, create-release]
    if: needs.prepare.outputs.source == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: update docker-compose.yml image tag
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.create-tag.outputs.version }}"
          repo_lower="${{ needs.prepare.outputs.repo_lower }}"
          sed -i "s|image: .*|image: ghcr.io/${repo_lower}:${version}|" docker-compose.yml

      - name: update CHANGELOG.md
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.create-tag.outputs.version }}"
          date=$(date -u +%Y-%m-%d)
          changelog="${{ needs.create-tag.outputs.changelog }}"

          header="## ${version} (${date})"
          new_entry="$(printf '%s\n\n%s\n' "$header" "$changelog")"

          if [ -f CHANGELOG.md ]; then
            printf '%s\n\n%s\n' "$new_entry" "$(cat CHANGELOG.md)" > CHANGELOG.md
          else
            printf '# Changelog\n\n%s\n' "$new_entry" > CHANGELOG.md
          fi

      - name: commit and push
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.create-tag.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docker-compose.yml CHANGELOG.md
          git commit -m "chore(release): update docker-compose.yml and CHANGELOG.md for ${version}"
          git push origin main
